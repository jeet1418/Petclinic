name: Petclinic CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'EKS/**'
      - '.github/**'
      - 'policy/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew test

      - name: Build Application
        run: ./gradlew build -x test

  push:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push action
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/petclinic:${{github.run_id}}

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest

    needs: push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Update tag in Helm chart
        run: |
          sed -i "s/tag: .*/tag: \"${{github.run_id}}\"/" helm/petclinic-chart/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "satyajit.1418@gmail.com"
          git config --global user.name "Satyajit Behera"
          git add helm/petclinic-chart/values.yaml
          git commit -m "Update tag in Helm chart"
          git pull --rebase origin main
          git push origin main