apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: petclinic-ing

spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: petclinic-svc
                port:
                  number: 80
